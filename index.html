<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#eee;
    display:flex;
    justify-content:center;
    padding:20px;
}

.container{
    position:relative;
    width:500px;
    transform-origin: top center;
}

@media (max-width: 600px){
    .container{
        transform: scale(0.7);
    }
}

.main-image{
    width:100%;
    display:block;
}

/* الأرقام */
.point{
    position:absolute;
    width:18px;
    height:18px;
    background:rgba(25,118,210,0.4);
    color:white;
    border-radius:50%;
    text-align:center;
    line-height:18px;
    font-size:10px;
    font-weight:bold;
    cursor:pointer;
}
.circle{
    position:absolute;

    width: 140px;;
    height: 140px;;

    border:40px solid #1976d2;   /* الدائرة المفرغة */
    border-radius:50%;

    cursor:pointer;
}

/* نافذة الصورة */
.popup{
    position:fixed;
    left:50%;
    top:50%;
    transform:translate(-50%, -50%);
    display:none;
    width:280px;
    max-width:90vw;
    background:white;
    padding:8px;
    border-radius:12px;
    box-shadow:0 0 20px rgba(0,0,0,.3);
    z-index:999;
}



.popup img{
    width:100%;
    border-radius:8px;
}

.point:hover .popup{
    display:block;
}
.circle:hover .popup{
    display:block;
}

/* خلفية الرسالة */
.welcome-popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;

    background:rgba(0,0,0,0.5);

    display:flex;
    justify-content:center;
    align-items:center;

    z-index:10000;
}

/* صندوق الرسالة */
.welcome-box{
    position:relative;

    background:white;
    width:400px;
    max-width:90vw;

    padding:30px;

    border-radius:15px;

    text-align:center;

    box-shadow:0 0 30px rgba(0,0,0,.3);
}

/* زر الإغلاق */
.close-btn{
    position:absolute;

    top:10px;
    right:15px;

    font-size:24px;
    cursor:pointer;

    font-weight:bold;
}

.close-btn:hover{
    color:red;
}
